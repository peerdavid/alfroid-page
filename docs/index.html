<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alfroid</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #1a202c, #2d3748);
      color: #f7fafc;
      text-align: center;
      padding: 2rem;
    }
    img { width: 120px; height: 120px; }
    h1 { font-size: 3rem; margin: 1rem 0 0.5rem; letter-spacing: 0.05em; }
    p { font-size: 1.1rem; color: #cbd5e0; max-width: 28rem; line-height: 1.6; }
    footer { margin-top: 2rem; font-size: 0.85rem; color: #718096; }
  </style>
</head>
<body>
  <img src="favicon.svg" alt="Alfroid robot logo">
  <h1>Alfroid</h1>
  <p>Your friendly little robot, dressed for the occasion.</p>
  <footer>&copy; 2026 Alfroid</footer>
</body>
</html>
